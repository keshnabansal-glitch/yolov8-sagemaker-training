name: YOLOv8 Training Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run training script
        env:
          ROBOFLOW_API_KEY: ${{ secrets.ROBOFLOW_API_KEY }}
        run: |
          python train.py

      - name: Debug - Show model path file
        run: |
          echo "Contents of model_path.txt:"
          cat model_path.txt || echo "model_path.txt not found"

      - name: Commit and push trained model to GitHub
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          if [ ! -f model_path.txt ]; then
            echo "ERROR: model_path.txt not found"
            exit 1
          fi

          MODEL_PATH=$(cat model_path.txt)

          echo "Model path from Python: $MODEL_PATH"

          if [ ! -f "$MODEL_PATH" ]; then
            echo "ERROR: best.pt not found at $MODEL_PATH"
            exit 1
          fi

          mkdir -p model
          cp "$MODEL_PATH" model/best.pt

          git add model/best.pt
          git commit -m "Auto-update trained model" || echo "No changes"

          git push