# Whenever code is pushed to GitHub → pipeline runs automatically

name: YOLOv8 Training Pipeline

on:
  push:
    branches:
      - main

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run training script
        env:
          ROBOFLOW_API_KEY: ${{ secrets.ROBOFLOW_API_KEY }}
        run: |
          python train.py

      - name: Debug - List files
        if: always()
        run: |
          echo "Checking for trained model files..."
          find . -name "best.pt" -type f 2>/dev/null || echo "No best.pt found"
          ls -la runs/ 2>/dev/null || echo "No runs directory"

      - name: Upload model artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yolov8-model
          path: runs/**/best.pt
          retention-days: 7
